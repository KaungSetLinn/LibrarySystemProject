<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Library Login</title>
    <style>
        body {
            font-family: Arial;
            background: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-box {
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 300px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        .msg {
            margin-top: 10px;
            color: red;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h2>Library Login</h2>

    <input type="number" id="user_id" placeholder="User ID">
    <input type="text" id="user_name" placeholder="User Name">

    <button onclick="login()">Login</button>

    <div class="msg" id="msg"></div>
</div>

<script>
async function login() {
    const user_id = Number(document.getElementById("user_id").value);
    const user_name = document.getElementById("user_name").value;

    const response = await fetch("http://localhost:3000/api/users/login", {
        method: "POST",
        credentials: "include", // session support
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            user_id,
            user_name
        })
    });

    const data = await response.json();

    console.log("Login response:", data); // 👈 DEBUG

    const msg = document.getElementById("msg");

    if (data) {
        msg.style.color = "green";
        msg.innerText = "Login successful!";

        setTimeout(() => {
            window.location.href = "/";
        }, 500);

    } else {
        msg.style.color = "red";
        msg.innerText = "Invalid credentials";
    }
}
</script>

</body>
</html>
