<!DOCTYPE html>
<html lang="ja">
<!--
  =============================================================================
  ファイル名 : advanced-search.html
  概要       : G03 詳細検索画面。
               書名・著者・分類・並び順・絞込条件を入力し、検索結果画面へ遷移。

  仕様書トレーサビリティ:
    - 外部仕様書 G03 詳細検索 / §4 画面遷移 / §6 入力データ仕様 / API-03
    - 要求仕様書 RF-05 詳細検索
    - 内部仕様書 SR01 normalizeSearchCriteria
    - テスト仕様 TC-SRH-02 / TC-SRH-04（条件エラー）

  関連 JS: js/screens/screen-advanced-search.js
  =============================================================================
-->
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>詳細検索 - 図書予約システム</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body data-page="advanced-search">

  <!-- ===== 共通ヘッダ ===== -->
  <header class="app-header" role="banner">
    <div class="brand">
      <span class="logo" aria-hidden="true">図</span>
      <span>図書予約システム</span>
    </div>
    <nav aria-label="メインナビ">
      <a href="reservation-status.html" data-nav="reservation-status">予約状況</a>
      <a href="advanced-search.html"    data-nav="advanced-search">蔵書検索</a>
      <a href="notification.html"       data-nav="notification">通知</a>
      <a href="mypage.html"             data-nav="mypage">マイページ</a>
    </nav>
    <div class="user-area">
      <span class="name" data-session-name>—</span>
      <a href="#" class="btn btn-light btn-sm" data-logout>ログアウト</a>
    </div>
  </header>

  <!-- ===== メイン ===== -->
  <main class="container" role="main">
    <div class="page-title">
      <h1>詳細検索</h1>
      <span class="desc">書名・著者・分類・並び順を指定して蔵書を検索します</span>
    </div>

    <!-- 共通メッセージ領域 -->
    <div class="app-message-host" data-message-host></div>

    <section class="card" aria-labelledby="advSearchTitle">
      <div class="card-title">
        <h2 id="advSearchTitle">検索条件</h2>
        <span class="muted" style="font-size:13px">
          ※ いずれか 1 つ以上を入力してください
        </span>
      </div>

      <form id="advancedSearchForm" autocomplete="off" novalidate>
        <div class="form-grid cols-3">
          <div class="field">
            <label for="title">書名（部分一致）</label>
            <input id="title" name="title" class="input" type="text"
                   placeholder="例: 銀河鉄道" />
          </div>
          <div class="field">
            <label for="author">著者名（部分一致）</label>
            <input id="author" name="author" class="input" type="text"
                   placeholder="例: 宮沢" />
          </div>
          <div class="field">
            <label for="category">分類</label>
            <select id="category" name="category" class="select">
              <option value="">指定なし</option>
              <!-- 残りの選択肢は screen-advanced-search.js が動的生成 -->
            </select>
          </div>

          <div class="field">
            <label for="sort">並び順</label>
            <select id="sort" name="sort" class="select">
              <option value="bookId">書籍ID 昇順（既定）</option>
              <option value="title">書名 昇順</option>
              <option value="author">著者 昇順</option>
              <option value="arrivalDateDesc">入荷日 降順</option>
            </select>
          </div>

          <div class="field">
            <label>絞込条件</label>
            <label class="checkbox">
              <input type="checkbox" id="availableOnly" />
              <span>貸出可能（在庫あり）のみ表示</span>
            </label>
            <label class="checkbox" style="margin-top:6px;">
              <input type="checkbox" id="reservableOnly" />
              <span>予約可能のみ表示（在庫あり または 貸出中）</span>
            </label>
          </div>
        </div>

        <div class="actions">
          <button class="btn btn-primary" type="submit">この条件で検索する</button>
          <button class="btn btn-light"   type="button" data-clear-form>条件をクリア</button>
          <a class="btn btn-ghost" href="reservation-status.html">← 予約状況に戻る</a>
        </div>
      </form>
    </section>

    <!-- 検索のヒント（ユーザー目線：現場語） -->
    <section class="card spacer-top">
      <div class="card-title">
        <h2>検索のヒント</h2>
      </div>
      <ul class="compact-list">
        <li>書名・著者名は<strong>部分一致</strong>で検索します（「銀河」で「銀河鉄道の夜」がヒット）。</li>
        <li>複数の条件は<strong>すべて満たす（AND）</strong>として絞り込みます。</li>
        <li>「貸出可能のみ」は今すぐ借りられる本だけ表示します。</li>
        <li>「予約可能のみ」は貸出中の本（待機予約可）も含めて表示します。</li>
      </ul>
    </section>
  </main>

  <button type="button" class="view-toggle" data-view-toggle>📱 スマホ表示でプレビュー</button>

  <!-- スクリプト -->
  <script src="js/library-config.js"></script>
  <script src="js/library-seed.js"></script>
  <script src="js/datasource/data-source.js"></script>
  <script src="js/datasource/excel-adapter.js"></script>
  <script src="js/datasource/sqlite-stub-adapter.js"></script>
  <script src="js/core/config-manager.js"></script>
  <script src="js/core/repository-factory.js"></script>
  <script src="js/core/service.js"></script>
  <script src="js/core/ui-common.js"></script>
  <script src="js/screens/screen-advanced-search.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
