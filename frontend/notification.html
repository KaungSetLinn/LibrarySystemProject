<!DOCTYPE html>
<html lang="ja">
<!--
  ファイル名 : notification.html
  概要       : 通知画面。直前の予約・取消処理の結果を表示する。
  保守担当   : Y.Toyoda
-->

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>図書予約システム 通知</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="notification">
  <!-- 画面全体の共通シェルを定義する。 -->
  <div class="shell">
    <!-- 上部ナビゲーションと利用者情報を表示する。 -->
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand">
          <div class="brand-mark">図</div>
          <div class="brand-copy">
            <strong>図書予約システム</strong>
            <span>処理結果・通知</span>
          </div>
        </div>
        <div class="header-side">
          <span class="date-chip" data-today></span>
          <span class="user-chip">利用者: <span data-user-name>---</span></span>
          <a class="btn btn-light" href="login.html" data-logout-link>ログアウト</a>
        </div>
      </div>
      <!-- 主要画面へ移動する共通ナビゲーションを表示する。 -->
      <nav class="nav-tabs">
        <a class="nav-tab" data-nav href="reservation-status.html">予約状況</a>
        <a class="nav-tab" data-nav href="search-results.html">検索結果</a>
        <a class="nav-tab" data-nav href="advanced-search.html">詳細検索</a>
        <a class="nav-tab" data-nav href="mypage.html">マイページ</a>
      </nav>
    </header>

    <!-- メインコンテンツ領域を定義する。 -->
        <!-- 処理結果を確認するメイン領域を定義する。 -->
    <main class="container">
      <!-- 直前処理の結果通知ダイアログを表示する。 -->
      <section class="dialog-shell">
        <section class="card dialog-card">
          <div class="card-body">
            <div class="dialog-icon success" data-notification-icon>✓</div>
            <h1 class="dialog-title" data-notification-title>処理結果</h1>
            <p class="dialog-text" data-notification-message>直前の処理結果を表示します。</p>

            <div class="summary-grid">
              <div class="summary-box">
                <strong>処理種別</strong>
                <div class="muted" data-notification-action>---</div>
              </div>
              <div class="summary-box">
                <strong>対象資料</strong>
                <div class="muted" data-notification-book>---</div>
              </div>
              <div class="summary-box">
                <strong>処理時刻</strong>
                <div class="muted" data-notification-time>---</div>
              </div>
            </div>

            <div class="step-strip" data-notification-steps></div>

            <div class="actions" style="justify-content:center; margin-top: 24px;">
              <a class="btn btn-primary" href="reservation-status.html">予約状況を確認</a>
              <a class="btn btn-secondary" href="search-results.html">検索結果へ戻る</a>
              <a class="btn btn-light" href="mypage.html">マイページ</a>
            </div>
          </div>
        </section>
      </section>
    </main>
  </div>
    <!-- 共通設定・初期データ・画面制御スクリプトを読み込む。 -->
  <script src="library-config.js"></script>
  <script src="library-seed.js"></script>
  <script src="app.js"></script>
</body>
</html>
