<!DOCTYPE html>
<!--
  READABLE-CODE REVIEW NOTE
  対象ファイル: frontend/index.html
  責務: HTML エントリまたはリダイレクトページ。SPA では index.html へ画面遷移を集約する。
  保守メモ: 画面ロジックは script 先の screen-* に集約し、HTML には構造と読込順だけを置く。
-->
<html lang="ja-JP">
<!--
  =============================================================================
  ファイル名 : app/index.html
  概要       : 図書予約システム v3.0.4 SPA エントリポイント。
               全画面（G01 ログイン〜G06 マイページ）を本HTML 1枚で動かす。

  仕様書トレーサビリティ:
    - 外部仕様書 v4.0  §3 画面一覧 / §4 画面遷移 / §10 UI共通仕様 / §10.4 レスポンシブ
    - 要求仕様書 v4.0  RF-02 / RF-14
    - 内部仕様書 v4.0  §3 モジュール構成
    - 改訂対象        S-1（SQLite 本実装化）/ スマホ表示乱れ一括修正

  改訂履歴:
    v1.0    2026-04-15  Y.Toyoda  v2.x 初版
    v3.0    2026-05-04  Y.Toyoda  SPA エントリに刷新
    v3.0.3  2026-05-05  Y.Toyoda  インライン style/script 廃止（CSP対応 S-2）
    v3.0.4  2026-05-05  Y.Toyoda  SQLiteAdapter（sql.js）/ ApiAdapter 読込追加、
                                  v3.0.4-mobile.css 追加（スマホ表示乱れ修正）

  @author  Y.Toyoda
  @version v3.0.4
  =============================================================================
-->
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="図書予約システム v3.0.4 — Y.Toyoda" />
  <meta name="theme-color" content="#1F3A68" />
  <title>図書予約システム v3.0.4</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/v3-additions.css" />
  <!-- v3.0.4 追加：スマホ表示乱れ一括修正（最後に読み込んで上書き） -->
  <link rel="stylesheet" href="css/v3.0.4-mobile.css" />
</head>
<body data-page="index">

  <!-- ===== 共通ヘッダ（ログイン後に表示） ===== -->
  <header class="app-header" data-app-header hidden>
    <div class="brand">
      <span class="logo" aria-hidden="true">図</span>
      <span>図書予約システム</span>
    </div>
    <nav aria-label="メイン">
      <a href="#/reservation-status" data-nav="reservation-status">予約状況</a>
      <a href="#/advanced-search"    data-nav="advanced-search">検索</a>
      <a href="#/notification"       data-nav="notification">通知</a>
      <a href="#/mypage"             data-nav="mypage">マイページ</a>
    </nav>
    <div class="user-area">
      <span class="name" data-session-name>未ログイン</span>
      <a href="#" class="btn btn-link" data-logout>ログアウト</a>
      <button type="button" class="btn btn-link" data-view-toggle></button>
    </div>
  </header>

  <!-- ===== ボトムナビ（スマホ専用、v3.0.4 mobile.css で表示制御） ===== -->
  <nav class="bottom-nav" aria-label="モバイルナビ" data-bottom-nav hidden>
    <a href="#/reservation-status" data-nav="reservation-status">
      <span class="bn-i" aria-hidden="true">📚</span>予約
    </a>
    <a href="#/advanced-search" data-nav="advanced-search">
      <span class="bn-i" aria-hidden="true">🔍</span>検索
    </a>
    <a href="#/notification" data-nav="notification">
      <span class="bn-i" aria-hidden="true">🔔</span>通知
    </a>
    <a href="#/mypage" data-nav="mypage">
      <span class="bn-i" aria-hidden="true">👤</span>マイ
    </a>
  </nav>

  <!-- ===== SPA メイン領域 ===== -->
  <main id="app-main" role="main" aria-live="polite">
    <div class="splash" role="status" aria-live="polite">
      <div class="ring" aria-hidden="true"></div>
      <div class="title">図書予約システムを準備しています…</div>
    </div>
  </main>

  <noscript>
    <p class="noscript-warning">
      JavaScript が無効になっています。本システムは JavaScript を有効にしてご利用ください。
    </p>
  </noscript>

  <!-- ============================================================ -->
  <!-- 起動スクリプト（読込み順は app.js 冒頭の規約に従う）              -->
  <!-- ============================================================ -->

  <!-- (1) 設定 fallback / seed -->
  <script src="js/library-config.js"></script>
  <script src="library-system-config.js"></script>
  <script src="js/library-seed.js"></script>

  <!-- (2) Core -->
  <script src="js/core/logger.js"></script>
  <script src="js/core/messages.js"></script>
  <script src="js/core/config-manager.js"></script>

  <!-- (3) DataSource：v3.0.4 で SQLiteAdapter（本実装）と ApiAdapter（HTTP 委譲）を追加 -->
  <script src="js/datasource/data-source.js"></script>
  <script src="js/datasource/excel-adapter.js"></script>
  <script src="js/core/api-client.js"></script>           <!-- ApiAdapter の依存先 -->
  <script src="js/datasource/api-adapter.js"></script>     <!-- v3.0.4 新設 -->
  <script src="js/datasource/sqlite-adapter.js"></script>  <!-- v3.0.4 新設（sql.js 本実装） -->
  <script src="js/datasource/sqlite-stub-adapter.js"></script>

  <!-- (4) Core (続) -->
  <script src="js/core/repository-factory.js"></script>
  <script src="js/core/service.js"></script>
  <script src="js/core/ui-common.js"></script>
  <script src="js/core/router.js"></script>

  <!-- (5) 各画面 -->
  <script src="js/screens/screen-login.js"></script>
  <script src="js/screens/screen-reservation-status.js"></script>
  <script src="js/screens/screen-advanced-search.js"></script>
  <script src="js/screens/screen-search-results.js"></script>
  <script src="js/screens/screen-notification.js"></script>
  <script src="js/screens/screen-mypage.js"></script>

  <!-- (6) アプリ起動エントリ -->
  <script src="js/app.js"></script>

  <!-- (7) ヘッダ・ボトムナビ表示制御 -->
  <script src="js/header-sync.js"></script>

</body>
</html>
